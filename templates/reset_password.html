{% extends "base.html" %}

{% block title %}Set New Password - Moodify{% endblock %}

{% block content %}
<section class="animate-up" style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    <div class="glass" style="padding: 3rem; max-width: 500px; width: 100%; text-align: center;">
        <i class="fas fa-key" style="font-size: 3rem; color: var(--secondary); margin-bottom: 2rem;"></i>
        <h2 style="font-size: 2rem; margin-bottom: 1rem;">New Password</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Please enter a new password for your account.</p>

        <form action="/reset_password/{{token}}" method="POST" onsubmit="return validatePasswords()">
            <div class="form-group" style="margin-bottom: 1.5rem; text-align: left;">
                <label style="display: block; margin-bottom: 0.5rem;">New Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="password" required
                        style="width: 100%; padding: 1rem; border-radius: 0.75rem; background: var(--bg-card); border: 1px solid var(--glass-border); color: var(--text-main);">
                    <button type="button" class="toggle-password" onclick="togglePassword('password', this)"
                        style="position: absolute; right: 1rem; top: 12px; background: none; border: none; color: var(--text-muted);">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 1.5rem; text-align: left;">
                <label style="display: block; margin-bottom: 0.5rem;">Confirm New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm_password" required
                        style="width: 100%; padding: 1rem; border-radius: 0.75rem; background: var(--bg-card); border: 1px solid var(--glass-border); color: var(--text-main);">
                    <button type="button" class="toggle-password" onclick="togglePassword('confirm_password', this)"
                        style="position: absolute; right: 1rem; top: 12px; background: none; border: none; color: var(--text-muted);">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 2rem; padding: 1rem;">
                <i class="fas fa-check-circle" style="margin-right: 0.5rem;"></i> Update Password
            </button>
        </form>
    </div>
</section>

<!-- Reuse script for password toggle and validation -->
<script>
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('i');
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    function validatePasswords() {
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm_password').value;
        if (password !== confirm) {
            alert('Passwords do not match!');
            return false;
        }
        if (password.length < 6) {
            alert('Password must be at least 6 characters long.');
            return false;
        }
        return true;
    }
</script>
{% endblock %}
